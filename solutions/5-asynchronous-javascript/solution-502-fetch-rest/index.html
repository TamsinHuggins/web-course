<!DOCTYPE html>
<html>
<head>
  <title>REST API Client (GET + POST) (Solution)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 30px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 12px;
      text-align: left;
    }
    th {
      background-color: #4CAF50;
      color: white;
    }
    tr:nth-child(even) {
      background-color: #f2f2f2;
    }
    .form-section {
      background-color: #f9f9f9;
      padding: 20px;
      border-radius: 5px;
      margin-top: 20px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      background-color: #4CAF50;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background-color: #45a049;
    }
    .error {
      color: red;
      font-size: 14px;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <h1>User Management System (Solution)</h1>

  <h2>Current Users</h2>
  <table id="usersTable">
    <thead>
      <tr>
        <th>Name</th>
        <th>Age</th>
      </tr>
    </thead>
    <tbody id="usersTableBody"></tbody>
  </table>

  <div class="form-section">
    <h2>Add New User</h2>
    <form id="addUserForm">
      <div class="form-group">
        <label for="userName">Name:</label>
        <input type="text" id="userName" name="userName" required minlength="2">
        <div id="nameError" class="error"></div>
      </div>

      <div class="form-group">
        <label for="userAge">Age:</label>
        <input type="number" id="userAge" name="userAge" required min="1" max="120">
        <div id="ageError" class="error"></div>
      </div>

      <button type="submit">Add User</button>
    </form>
  </div>

  <script src="client.js"></script>
</body>
</html>
