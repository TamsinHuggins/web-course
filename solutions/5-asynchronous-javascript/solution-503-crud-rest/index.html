<!DOCTYPE html>
<html>
<head>
  <title>REST API Client (Full CRUD) (Solution)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1000px;
      margin: 50px auto;
      padding: 20px;
      background-color: #f5f5f5;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 30px;
      background-color: white;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 12px;
      text-align: left;
    }
    th {
      background-color: #4CAF50;
      color: white;
    }
    tr:nth-child(even) {
      background-color: #f9f9f9;
    }
    .action-buttons { display: flex; gap: 8px; }
    .form-section { background-color: white; padding: 20px; border-radius: 8px; margin-top: 20px; }
    .hidden { display: none; }
    .error { color: #f44336; font-size: 14px; margin-top: 5px; }

    .message-box { padding: 12px; border-radius: 6px; margin-bottom: 16px; display: none; }
    .message-box.success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
    .message-box.error { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }

    button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
    .btn-primary { background-color: #4CAF50; color: white; }
    .btn-update  { background-color: #2196F3; color: white; }
    .btn-delete  { background-color: #f44336; color: white; }
    .btn-cancel  { background-color: #9E9E9E; color: white; }
  </style>
</head>
<body>
  <h1>REST API Client — Full CRUD (Solution)</h1>

  <div id="messageBox" class="message-box"></div>

  <h2>Current Users</h2>
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="usersTableBody"></tbody>
  </table>

  <div class="form-section" id="addUserSection">
    <h2>Add New User</h2>
    <form id="addUserForm">
      <label>
        Name:
        <input id="addUserName" type="text" required minlength="2" />
      </label>
      <div id="addNameError" class="error"></div>

      <label>
        Age:
        <input id="addUserAge" type="number" required min="1" max="120" />
      </label>
      <div id="addAgeError" class="error"></div>

      <button class="btn-primary" type="submit">Add User</button>
    </form>
  </div>

  <div class="form-section hidden" id="updateUserSection">
    <h2>Update User</h2>
    <form id="updateUserForm">
      <label>
        Name:
        <input id="updateUserName" type="text" required minlength="2" />
      </label>
      <div id="updateNameError" class="error"></div>

      <label>
        Age:
        <input id="updateUserAge" type="number" required min="1" max="120" />
      </label>
      <div id="updateAgeError" class="error"></div>

      <div style="display:flex; gap:10px; margin-top: 10px;">
        <button class="btn-update" type="submit">Update User</button>
        <button class="btn-cancel" type="button" id="btnCancelUpdate">Cancel</button>
      </div>
    </form>
  </div>

  <script src="crud-client.js"></script>
</body>
</html>
