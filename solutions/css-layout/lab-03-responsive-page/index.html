<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lab 03 - Responsive page layout (Solution)</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="header">
    <h1>Responsive page layout</h1>
    <p class="muted">Mobile-first layout using Grid + media queries.</p>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <h2>Sidebar</h2>
      <ul>
        <li><a href="#">Link A</a></li>
        <li><a href="#">Link B</a></li>
        <li><a href="#">Link C</a></li>
      </ul>
    </aside>

    <main class="main">
      <h2>Main</h2>
      <p>
        This area takes most of the screen on desktop. On mobile it stacks.
      </p>
      <div class="cards">
        <article class="card">Card 1</article>
        <article class="card">Card 2</article>
        <article class="card">Card 3</article>
      </div>
    </main>

    <footer class="footer">
      <small>Footer</small>
    </footer>
  </div>
</body>
</html>
