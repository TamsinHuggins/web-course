<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab 03 — DOM + Events (Solution)</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; line-height: 1.4; padding: 24px; }
    .card { max-width: 420px; border: 1px solid #ddd; border-radius: 12px; padding: 16px; }
    .value { font-size: 48px; font-weight: 700; margin: 8px 0 16px; }
    .row { display: flex; gap: 8px; }
    button { padding: 10px 12px; border-radius: 10px; border: 1px solid #ccc; background: #f8f8f8; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <h1>Lab 03 — DOM + Events (Solution)</h1>

  <div class="card">
    <div>Counter value</div>
    <div id="counterValue" class="value">0</div>

    <div class="row">
      <button id="btnDecrement" type="button">-1</button>
      <button id="btnIncrement" type="button">+1</button>
      <button id="btnReset" type="button">Reset</button>
    </div>
  </div>

  <script src="counter.js" defer></script>
</body>
</html>
