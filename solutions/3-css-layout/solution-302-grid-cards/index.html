<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lab 02 - Grid cards (Solution)</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="page">
    <h1>Responsive card grid (CSS Grid)</h1>
    <p class="muted">Uses auto-fit/minmax and a featured card on desktop.</p>
  </header>

  <main class="page">
    <section class="grid">
      <article class="card featured">
        <h2>Featured</h2>
        <p>Spans 2 columns at larger widths.</p>
      </article>

      <article class="card"><h2>Card 1</h2><p>Content</p></article>
      <article class="card"><h2>Card 2</h2><p>Content</p></article>
      <article class="card"><h2>Card 3</h2><p>Content</p></article>
      <article class="card"><h2>Card 4</h2><p>Content</p></article>
      <article class="card"><h2>Card 5</h2><p>Content</p></article>
    </section>
  </main>
</body>
</html>
