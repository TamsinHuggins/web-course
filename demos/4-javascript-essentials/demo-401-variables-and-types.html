<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Variables and Types</title>
  <link rel="stylesheet" href="./_demo-shared.css" />
</head>
<body>
  <h1>Variables and types</h1>
  <p>Open DevTools Console to see output.</p>

  <pre id="out">Running...</pre>

  <script>
    const out = document.querySelector('#out');

    // let / const
    let userName = 'Ada';
    const year = 2026;

    // primitives
    const age = 29; // number
    const isStudent = true; // boolean

    // assigning to undeclared variable (NOT recommended; becomes global in sloppy mode)
    // Note: In strict mode this would throw.
    accidentalGlobal = 'I should not exist';

    const lines = [];
    lines.push(`userName=${userName} (type ${typeof userName})`);
    lines.push(`year=${year} (type ${typeof year})`);
    lines.push(`age=${age} (type ${typeof age})`);
    lines.push(`isStudent=${isStudent} (type ${typeof isStudent})`);
    lines.push(`accidentalGlobal=${accidentalGlobal} (type ${typeof accidentalGlobal})`);

    out.textContent = lines.join('\n');
    console.log(lines.join('\n'));
  </script>
</body>
</html>
