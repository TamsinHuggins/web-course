<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Operators and Strings</title>
  <link rel="stylesheet" href="./_demo-shared.css" />
</head>
<body>
  <h1>Operators and strings</h1>
  <pre id="out">Running...</pre>

  <script>
    const out = document.querySelector('#out');

    let x = 10;
    const y = 5;

    const arithmetic = {
      add: x + y,
      sub: x - y,
      mul: x * y,
      div: x / y
    };

    x += 3; // assignment operator

    const name = 'Ada';
    const concat1 = 'Hello ' + name + ' (x=' + x + ')';
    const concat2 = `Hello ${name} (x=${x})`; // template literal

    const mix = 'Total=' + (10 + 5) + ' and also ' + 10 + 5; // stringifies

    out.textContent = [
      'Arithmetic:',
      JSON.stringify(arithmetic, null, 2),
      '',
      concat1,
      concat2,
      '',
      `Mixing numbers + strings: ${mix}`
    ].join('\n');

    console.log(arithmetic, concat1, concat2, mix);
  </script>
</body>
</html>
