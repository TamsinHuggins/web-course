<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo 03 - Tests and Flow Control</title>
  <link rel="stylesheet" href="./_demo-shared.css" />
</head>
<body>
  <h1>Tests and flow control</h1>
  <pre id="out">Running...</pre>

  <script>
    const out = document.querySelector('#out');

    const lines = [];

    // == vs ===
    lines.push(`'5' == 5  -> ${'5' == 5}`);
    lines.push(`'5' === 5 -> ${'5' === 5}`);

    // if / else
    const score = 72;
    let grade;

    if (score >= 70) {
      grade = 'A';
    } else if (score >= 60) {
      grade = 'B';
    } else {
      grade = 'C';
    }

    lines.push(`score=${score}, grade=${grade}`);

    // switch
    const day = 'Mon';
    let msg;
    switch (day) {
      case 'Mon':
      case 'Tue':
        msg = 'Start of week';
        break;
      case 'Fri':
        msg = 'Almost done';
        break;
      default:
        msg = 'Some other day';
    }

    lines.push(`day=${day} -> ${msg}`);

    // logical operators + ternary
    const isAdult = true;
    const hasTicket = false;
    const canEnter = isAdult && hasTicket;

    lines.push(`canEnter (&&): ${canEnter}`);
    lines.push(`message (ternary): ${canEnter ? 'Welcome' : 'No entry'}`);

    out.textContent = lines.join('\n');
    console.log(lines.join('\n'));
  </script>
</body>
</html>
