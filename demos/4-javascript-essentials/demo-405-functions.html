<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Functions</title>
  <link rel="stylesheet" href="./_demo-shared.css" />
</head>
<body>
  <h1>Functions</h1>
  <pre id="out">Running...</pre>

  <script>
    const out = document.querySelector('#out');

    function add(a, b) {
      return a + b;
    }

    function greet(name = 'friend') {
      return `Hello, ${name}`;
    }

    const total = add(2, 3);
    const g1 = greet('Ada');
    const g2 = greet();

    out.textContent = [
      `add(2,3) = ${total}`,
      g1,
      g2,
      '',
      'Note: JS does not overload functions by parameter count.'
    ].join('\n');
  </script>
</body>
</html>
