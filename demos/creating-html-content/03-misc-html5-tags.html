<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo 03 - Misc HTML5 Tags</title>
</head>
<body>
  <h1>Miscellaneous HTML5 elements</h1>

  <section>
    <h2><code>&lt;details&gt;</code> / <code>&lt;summary&gt;</code></h2>
    <details>
      <summary>Click to expand</summary>
      <p>This is a native disclosure widget with no JavaScript required.</p>
    </details>
  </section>

  <section>
    <h2><code>&lt;time&gt;</code></h2>
    <p>
      The event starts at
      <time datetime="2026-02-01T09:00:00Z">1 Feb 2026, 09:00 UTC</time>.
    </p>
  </section>

  <section>
    <h2><code>&lt;progress&gt;</code> and <code>&lt;meter&gt;</code></h2>
    <p>
      <label for="p">Progress:</label>
      <progress id="p" value="70" max="100">70%</progress>
    </p>

    <p>
      <label for="m">Meter (e.g. disk usage):</label>
      <meter id="m" value="0.65">65%</meter>
    </p>
  </section>
</body>
</html>
