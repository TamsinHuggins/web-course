<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo 07 - Flexbox layout</title>
  <link rel="stylesheet" href="./_demo-shared.css" />
  <style>
    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
    }

    .left, .right {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .pill {
      border: 1px solid rgba(255, 106, 0, 0.35);
      background: rgba(255, 106, 0, 0.16);
      padding: 8px 10px;
      border-radius: 999px;
    }

    .spacer {
      flex: 1;
      min-width: 40px;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1 style="margin:0;">Flexbox basics</h1>
      <p class="muted" style="margin: 8px 0 0;">Alignment, spacing, wrapping, and flexible items.</p>
    </div>
    <div class="badge">Demo 07</div>
  </header>

  <section class="panel">
    <div class="toolbar">
      <div class="left">
        <strong>Brand</strong>
        <span class="pill">Docs</span>
        <span class="pill">Tutorials</span>
      </div>

      <div class="spacer"></div>

      <div class="right">
        <span class="pill">Sign in</span>
        <span class="pill">Register</span>
      </div>
    </div>

    <p class="muted" style="margin-bottom:0;">Resize the window: items wrap while staying aligned.</p>
  </section>
</body>
</html>
