<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inline CSS</title>
</head>
<body style="font-family: system-ui, Arial, sans-serif; max-width: 900px; margin: 40px auto; line-height: 1.5;">
  <h1 style="margin-bottom: 0;">Inline CSS</h1>
  <p style="margin-top: 8px; color: #444;">Inline styling is useful for quick experiments, but doesn’t scale well.</p>

  <div style="display: grid; gap: 12px; grid-template-columns: 1fr 1fr; margin-top: 24px;">
    <div style="padding: 16px; border: 1px solid #ddd; border-radius: 10px; background: #fafafa;">
      <h2 style="margin-top: 0;">Pros</h2>
      <ul>
        <li>Fast to try</li>
        <li>All in one file</li>
      </ul>
    </div>

    <div style="padding: 16px; border: 1px solid #ddd; border-radius: 10px; background: #fff;">
      <h2 style="margin-top: 0;">Cons</h2>
      <ul>
        <li>Hard to maintain</li>
        <li>Hard to reuse</li>
      </ul>
    </div>
  </div>
</body>
</html>
