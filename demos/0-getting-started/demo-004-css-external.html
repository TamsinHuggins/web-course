<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo 04 - External CSS</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header>
    <div>
      <h1 style="margin: 0;">External CSS</h1>
      <p class="muted" style="margin: 8px 0 0;">Same look, but styles are in <code>styles.css</code>.</p>
    </div>
    <div class="badge">Demo 04</div>
  </header>

  <section class="panel">
    <h2 style="margin-top: 0;">Why external CSS?</h2>
    <ul class="muted">
      <li>Reuse across multiple pages</li>
      <li>Separates structure (HTML) from styling (CSS)</li>
      <li>Smaller HTML files, easier to maintain</li>
    </ul>
  </section>
</body>
</html>
