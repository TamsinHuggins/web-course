<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo 03 - CSS in a &lt;style&gt; tag</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #121b2f;
      --text: #e9eefc;
      --muted: #aab6da;
      --accent: #ff6a00;
    }

    body {
      font-family: system-ui, Arial, sans-serif;
      background: radial-gradient(1200px 800px at 10% 0%, #1a2a52, var(--bg));
      color: var(--text);
      max-width: 960px;
      margin: 40px auto;
      padding: 0 16px;
      line-height: 1.5;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 18px;
    }

    .badge {
      background: rgba(255, 106, 0, 0.12);
      padding: 6px 10px;
      border: 1px solid rgba(255, 106, 0, 0.35);
      border-radius: 999px;
      color: var(--accent);
      font-weight: 600;
      font-size: 12px;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .card {
      background: rgba(18, 27, 47, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.25);
    }

    .card h2 {
      margin-top: 0;
      font-size: 16px;
    }

    .muted {
      color: var(--muted);
    }

    code {
      background: rgba(255, 255, 255, 0.08);
      padding: 2px 6px;
      border-radius: 6px;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1 style="margin: 0;">CSS using a <code>&lt;style&gt;</code> block</h1>
      <p class="muted" style="margin: 8px 0 0;">Tag selectors, class selectors, variables, and responsive layout.</p>
    </div>
    <div class="badge">Demo 03</div>
  </header>

  <section class="grid">
    <div class="card">
      <h2>Tag selector</h2>
      <p class="muted">The <code>body</code> rule sets a base font, color, layout.</p>
    </div>
    <div class="card">
      <h2>Class selector</h2>
      <p class="muted">We use <code>.card</code> and <code>.muted</code> for reusable styles.</p>
    </div>
    <div class="card">
      <h2>Media query</h2>
      <p class="muted">The layout collapses to one column under 900px.</p>
    </div>
  </section>
</body>
</html>
