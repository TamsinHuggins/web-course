<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HTML5 Selector API</title>
  <link rel="stylesheet" href="./styles.css" />
  <script defer src="./06-selector-api.js"></script>
</head>
<body>
  <header>
    <div>
      <h1 style="margin: 0;">Selector API</h1>
      <p class="muted" style="margin: 8px 0 0;">Using <code>querySelector</code> / <code>querySelectorAll</code> with CSS selectors.</p>
    </div>
    <div class="badge">Demo 06</div>
  </header>

  <section class="panel">
    <h2 style="margin-top: 0;">Choose interests</h2>

    <form id="interestsForm">
      <label><input type="checkbox" name="interest" value="html" checked /> HTML</label><br />
      <label><input type="checkbox" name="interest" value="css" /> CSS</label><br />
      <label><input type="checkbox" name="interest" value="js" checked /> JavaScript</label><br />

      <div style="margin-top: 14px;">
        <button id="btnShow" type="button">Show checked</button>
        <button id="btnToggle" type="button">Toggle CSS checkbox</button>
      </div>
    </form>

    <pre id="out" class="panel" style="margin-top: 14px; white-space: pre-wrap;"></pre>
  </section>
</body>
</html>
