<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HTML Structure</title>
</head>
<body>
  <header>
    <h1>Getting Started with HTML</h1>
    <p>This page demonstrates basic document structure and semantic elements.</p>
  </header>

  <main>
    <section>
      <h2>Semantic elements</h2>
      <ul>
        <li><code>&lt;header&gt;</code>, <code>&lt;main&gt;</code>, <code>&lt;section&gt;</code>, <code>&lt;article&gt;</code>, <code>&lt;footer&gt;</code></li>
        <li>Help readability and accessibility</li>
      </ul>
    </section>

    <article>
      <h2>Forms (preview)</h2>
      <form>
        <label for="name">Name</label>
        <input id="name" name="name" type="text" placeholder="Ada" />

        <label for="age">Age</label>
        <input id="age" name="age" type="number" min="0" max="120" />

        <button type="button">A button (no JS yet)</button>
      </form>
    </article>
  </main>

  <footer>
    <small>Demo 01</small>
  </footer>
</body>
</html>
