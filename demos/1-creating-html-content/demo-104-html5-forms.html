<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HTML5 Forms</title>
  <style>
    body {
      font-family: system-ui, Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 16px;
      line-height: 1.5;
    }

    fieldset {
      margin-bottom: 16px;
      padding: 12px 14px;
    }

    .row {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 10px;
      margin: 10px 0;
      align-items: center;
    }

    input, select, button {
      font: inherit;
    }

    input, select {
      padding: 8px 10px;
    }

    .hint {
      color: #555;
      font-size: 12px;
      grid-column: 2;
    }

    @media (max-width: 700px) {
      .row { grid-template-columns: 1fr; }
      .hint { grid-column: 1; }
    }
  </style>
</head>
<body>
  <h1>HTML5 Forms</h1>
  <p>
    Demonstrates <code>fieldset</code>/<code>legend</code>, modern input types, and common attributes.
  </p>

  <form>
    <fieldset>
      <legend>Contact</legend>

      <div class="row">
        <label for="name">Name</label>
        <input id="name" name="name" type="text" placeholder="Ada Lovelace" required autofocus />
        <div class="hint">Uses <code>required</code> and <code>autofocus</code>.</div>
      </div>

      <div class="row">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="ada@example.com" required />
        <div class="hint">Type <code>email</code> enables built-in validation.</div>
      </div>

      <div class="row">
        <label for="tel">Telephone</label>
        <input id="tel" name="tel" type="tel" placeholder="+44 20 1234 5678" />
      </div>
    </fieldset>

    <fieldset>
      <legend>Preferences</legend>

      <div class="row">
        <label for="start">Start date</label>
        <input id="start" name="start" type="date" />
      </div>

      <div class="row">
        <label for="rating">Rating (1-10)</label>
        <input id="rating" name="rating" type="number" min="1" max="10" required />
        <div class="hint">Uses <code>min</code>/<code>max</code>.</div>
      </div>

      <div class="row">
        <label for="colour">Favourite colour</label>
        <input id="colour" name="colour" type="color" value="#ff6a00" />
      </div>

      <div class="row">
        <label for="query">Search</label>
        <input id="query" name="query" type="search" placeholder="try typing..." />
      </div>
    </fieldset>

    <button type="submit">Submit</button>
    <button type="reset">Reset</button>
  </form>
</body>
</html>
