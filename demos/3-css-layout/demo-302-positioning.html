<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Positioning</title>
  <link rel="stylesheet" href="./_demo-shared.css" />
  <style>
    .stage {
      height: 220px;
      position: relative;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 14px;
      padding: 12px;
      background: rgba(255,255,255,0.03);
      overflow: hidden;
    }

    .dot {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-weight: 800;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255, 106, 0, 0.20);
    }

    .static { position: static; }

    .relative { position: relative; left: 18px; top: 12px; }

    .absolute {
      position: absolute;
      right: 12px;
      bottom: 12px;
      background: rgba(88,133,255,0.22);
    }

    .fixed {
      position: fixed;
      right: 16px;
      bottom: 16px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.18);
      padding: 10px 12px;
      border-radius: 12px;
      z-index: 999;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1 style="margin:0;">CSS positioning</h1>
      <p class="muted" style="margin: 8px 0 0;">static / relative / absolute / fixed.</p>
    </div>
    <div class="badge">Demo 02</div>
  </header>

  <section class="panel">
    <p class="muted" style="margin-top:0;">The stage is <code>position: relative</code> so the absolute dot uses it as its containing block.</p>

    <div class="stage">
      <div class="dot static">S</div>
      <div class="dot relative" style="margin-top: 10px;">R</div>
      <div class="dot absolute">A</div>
    </div>

    <p class="muted" style="margin-bottom:0;">Scroll the page to see the fixed badge stay in place.</p>
  </section>

  <div class="fixed">Fixed</div>

  <div style="height: 900px;"></div>
</body>
</html>
