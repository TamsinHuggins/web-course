<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo 06 - Responsive Grid (CSS Grid)</title>
  <link rel="stylesheet" href="./_demo-shared.css" />
  <style>
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .item {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 14px;
      padding: 12px;
    }

    .item h2 { margin-top: 0; color: var(--accent); font-size: 16px; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1 style="margin:0;">Responsive grid (CSS Grid)</h1>
      <p class="muted" style="margin: 8px 0 0;">Uses <code>auto-fit</code> + <code>minmax</code> for responsive cards.</p>
    </div>
    <div class="badge">Demo 06</div>
  </header>

  <section class="panel">
    <div class="grid">
      <div class="item"><h2>220px min</h2><p class="muted">Cards wrap automatically.</p></div>
      <div class="item"><h2>Fluid</h2><p class="muted">No media queries needed.</p></div>
      <div class="item"><h2>Modern</h2><p class="muted">Great for responsive UIs.</p></div>
      <div class="item"><h2>Try</h2><p class="muted">Resize the window.</p></div>
      <div class="item"><h2>Auto</h2><p class="muted">The grid adapts.</p></div>
      <div class="item"><h2>Fit</h2><p class="muted">Auto-fit fills available space.</p></div>
    </div>
  </section>
</body>
</html>
